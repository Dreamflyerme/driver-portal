services:
  - type: web
    name: driver-dispatch-portal
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_PATH
        value: /var/data/driver_portal.sqlite3
    disk:
      name: driver-portal-data
      mountPath: /var/data
      sizeGB: 5
